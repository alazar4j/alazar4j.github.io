<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in-page</title>
</head>
<body>
   
    <hr>
    <h1>Sign-in</h1>
    <form method="">
        <label  for="name" >Name:</label>
        <input placeholder="Alazar ginbaru" type="text" id="name" required > <br> <br>
       
        <label for="email" >Email:</label>
        <input  placeholder="alazarginbaru1@gmail.com"  type="email" id="email" required > <br> <br>
        <label for="Password" >Password:</label>
        <input type="Password"  id="Password" required minlength="8"  > <br> <br>
        <label for="Country"  >Country</label> 
        <select>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="uc">Canada</option>

        </select> <br> <br>
        <input type="checkbox" id="remember" >
        <label for="remember"  >remember</label> <br> <br>
   
         <div><button type="submit" >Submit</button>
            <button type="button" >Cancel</button> 
        </div>
        <br>

    </form>
</body>
</html>
